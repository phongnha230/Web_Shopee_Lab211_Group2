# ========================================
# Development Profile
# ========================================
# File này chỉ áp dụng khi chạy profile dev.
# Mục tiêu: thuận tiện cho local development và debugging.

# ========================================
# CORS Configuration
# ========================================
# Các origin frontend local được phép gọi API trong môi trường dev
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ========================================
# Google OAuth Configuration
# ========================================
# Callback URL của frontend local sau khi login Google thành công
app.oauth.google.redirect-uri=http://localhost:3000/auth/callback/google

# ========================================
# Swagger / OpenAPI
# ========================================
# Bật API docs để frontend / backend dev test nhanh endpoint
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ========================================
# Logging Configuration
# ========================================
# Giữ log chi tiết hơn để debug local
logging.level.root=INFO
logging.level.com.shoppeclone.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
