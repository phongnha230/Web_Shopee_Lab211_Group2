# ========================================
# Application Information
# ========================================
# Tên ứng dụng hiển thị trong Spring context
spring.application.name=web-shoppe

# ========================================
# Active Profile
# ========================================
# Mặc định chạy profile dev khi local.
# Khi deploy production, set SPRING_PROFILES_ACTIVE=prod.
spring.profiles.default=dev

# ========================================
# Server Port Configuration
# ========================================
# Cổng chạy backend
server.port=8088

# ========================================
# MongoDB Configuration
# ========================================

# Local MongoDB (KHÔNG DÙNG)
# spring.data.mongodb.uri=mongodb://localhost:27017/web_shoppe

# MongoDB Atlas (ĐANG DÙNG)
# MongoDB Atlas (ĐANG DÙNG)
spring.data.mongodb.uri=${MONGODB_URI}
# Tên database MongoDB đang dùng
spring.data.mongodb.database=web_shoppe

# ========================================
# JWT Configuration
# ========================================

# JWT Secret Key (Phải ít nhất 256 bits = 32 ký tự)
# JWT Secret Key (Phải ít nhất 256 bits = 32 ký tự)
jwt.secret=${JWT_SECRET}
# Thời gian hết hạn access token, đơn vị milliseconds
jwt.expiration=${JWT_EXPIRATION:1800000}
# Thời gian hết hạn refresh token, đơn vị milliseconds
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================================
# Google OAuth2 Configuration
# ========================================
# Credentials Google OAuth đọc từ env theo từng môi trường
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# Endpoint OAuth chuẩn của Google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ========================================
# Email Configuration (Gmail SMTP)
# ========================================
# SMTP server dùng để gửi OTP / mail hệ thống
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# OTP Configuration
# ========================================
# Thời gian OTP còn hiệu lực, đơn vị milliseconds
otp.expiration=${OTP_EXPIRATION:300000}

# ========================================
# Auth Rate Limit Configuration
# ========================================
# Giới hạn số lần thử login / OTP để giảm brute-force và spam
# Chọn nơi lưu rate limit: mongo (mặc định) hoặc redis
app.auth.rate-limit.store=${AUTH_RATE_LIMIT_STORE:mongo}
auth.rate-limit.login.email.max-failures=5
auth.rate-limit.login.ip.max-failures=20
auth.rate-limit.login.window-minutes=15
auth.rate-limit.login.block-minutes=15
auth.rate-limit.otp-send.email.max-attempts=5
auth.rate-limit.otp-send.ip.max-attempts=20
auth.rate-limit.otp-send.window-minutes=60
auth.rate-limit.otp-send.block-minutes=15
auth.rate-limit.otp-send.cooldown-seconds=60
auth.rate-limit.otp-verify.email.max-failures=5
auth.rate-limit.otp-verify.ip.max-failures=20
auth.rate-limit.otp-verify.window-minutes=10
auth.rate-limit.otp-verify.block-minutes=15

# ========================================
# Cloudinary Configuration
# ========================================
# Cấu hình Cloudinary dùng cho upload ảnh
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ========================================
# Shared CORS Configuration
# ========================================
# Các cấu hình CORS dùng chung cho mọi profile.
# Riêng danh sách allowed origins sẽ override ở file dev / prod.
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With,Origin,Refresh-Token
app.cors.exposed-headers=Authorization,Refresh-Token
app.cors.allow-credentials=true

# ========================================
# Spring Boot Runtime Flags
# ========================================
# Cho phép circular references để tránh fail startup.
# Đây là workaround, không phải giải pháp lâu dài cho bean cycle.
spring.main.allow-circular-references=true

# ========================================
# Redis Configuration
# ========================================
# Redis là tùy chọn. Chỉ cần set khi muốn dùng app.auth.rate-limit.store=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ========================================
# Tomcat Thread Config - Flash Sale Support
# ========================================
# Tăng khả năng chịu tải cho các request đồng thời, nhất là flash sale
server.tomcat.threads.max=500
server.tomcat.accept-count=1000
server.tomcat.connection-timeout=20000

# ========================================
# Timezone Configuration
# ========================================
# Timezone mặc định khi serialize/deserialize ngày giờ JSON
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ========================================
# Elasticsearch Configuration
# ========================================
spring.elasticsearch.uris=http://localhost:9200
