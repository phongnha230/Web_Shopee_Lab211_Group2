# ========================================
# Production Profile
# ========================================
# File này chỉ áp dụng khi chạy profile prod.
# Mục tiêu: siết config hơn cho môi trường deploy thật.

# ========================================
# CORS Configuration
# ========================================
# Bắt buộc khai báo rõ domain frontend production qua env
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# ========================================
# Google OAuth Configuration
# ========================================
# Callback URL của frontend production, lấy từ biến môi trường
app.oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:}

# ========================================
# Swagger / OpenAPI
# ========================================
# Tắt Swagger mặc định ở production để giảm lộ bề mặt API
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

# ========================================
# Logging Configuration
# ========================================
# Giảm log xuống mức an toàn hơn khi chạy production
logging.level.root=INFO
logging.level.com.shoppeclone.backend=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO
