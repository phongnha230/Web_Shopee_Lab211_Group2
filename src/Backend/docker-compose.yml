version: '3.8'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: shoppeclone-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disable security for local development to avoid SSL/password config complexity
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - shoppeclone-network

volumes:
  elasticsearch-data:

networks:
  shoppeclone-network:
    driver: bridge
