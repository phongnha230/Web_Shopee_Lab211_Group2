<!DOCTYPE html>

    <!-- Global Fetch Interceptor for Token Refresh -->
    <script>
        (function() {
            const originalFetch = window.fetch;
            let isRefreshing = false;
            let refreshPromise = null;

            window.fetch = async function(...args) {
                let response;
                try {
                    response = await originalFetch(...args);
                } catch (error) {
                    throw error;
                }
                
                if (response.status === 401 && typeof args[0] === 'string' && !args[0].includes('/auth/login') && !args[0].includes('/auth/refresh-token')) {
                    const refreshToken = localStorage.getItem('refreshToken');
                    if (refreshToken) {
                        if (!isRefreshing) {
                            isRefreshing = true;
                            refreshPromise = (async () => {
                                try {
                                    const refreshResponse = await originalFetch('http://localhost:8080/api/auth/refresh-token', {
                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'Refresh-Token': refreshToken
                                        }
                                    });
                                    
                                    if (refreshResponse.ok) {
                                        const data = await refreshResponse.json();
                                        localStorage.setItem('accessToken', data.accessToken);
                                        localStorage.setItem('refreshToken', data.refreshToken);
                                        return data.accessToken;
                                    } else {
                                        localStorage.clear();
                                        window.location.href = 'login.html';
                                        return new Promise(() => {});
                                    }
                                } catch (e) {
                                    localStorage.clear();
                                    window.location.href = 'login.html';
                                    return new Promise(() => {});
                                } finally {
                                    isRefreshing = false;
                                }
                            })();
                        }

                        try {
                            const newAccessToken = await refreshPromise;
                            if (args[1]) {
                                args[1].headers = args[1].headers || {};
                                if (args[1].headers instanceof Headers) {
                                    args[1].headers.set('Authorization', 'Bearer ' + newAccessToken);
                                } else {
                                    args[1].headers['Authorization'] = 'Bearer ' + newAccessToken;
                                }
                            }
                            return originalFetch(...args);
                        } catch (e) {
                            return new Promise(() => {});
                        }
                    } else {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return new Promise(() => {});
                    }
                }
                return response;
            };
        })();
    </script>


    


    


    


    


    


    


    


    


    

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vouchers - GoShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }

            100% {
                background-position: 1000px 0;
            }
        }

        .shimmer {
            background: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }

        .voucher-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        .voucher-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .voucher-orange {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
        }

        .voucher-green {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }

        .voucher-blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .voucher-purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .voucher-pink {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .voucher-cyan {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .voucher-teal {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .voucher-gray {
            background: linear-gradient(135deg, #9ca3af 0%, #d1d5db 100%);
            opacity: 0.8;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50">
    <!-- Header -->
    <header class="header-gradient shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-3">
                    <a href="javascript:history.back()" class="text-white hover:text-orange-200">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <i class="fas fa-tags text-3xl text-white"></i>
                    <span class="text-2xl font-bold text-white">Product Vouchers</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="bg-white border-b sticky top-16 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex space-x-8">
                <button id="tab-product" onclick="switchTab('product')"
                    class="py-4 px-2 border-b-2 border-orange-500 text-orange-600 font-semibold transition-colors">
                    Product Discounts
                </button>
                <button id="tab-shipping" onclick="switchTab('shipping')"
                    class="py-4 px-2 text-gray-600 hover:text-orange-500 transition-colors">
                    Free Shipping
                </button>
                <button id="tab-collected" onclick="switchTab('collected')"
                    class="py-4 px-2 text-gray-600 hover:text-orange-500 transition-colors">
                    Collected (<span id="collectedCount">3</span>)
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Banner -->
        <div class="bg-gradient-to-r from-orange-400 to-pink-500 rounded-xl p-6 mb-6 text-white">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold mb-2">Save Big on Products!</h2>
                    <p class="text-orange-100">Get up to 50% OFF on your orders</p>
                </div>
                <div class="text-right">
                    <div class="text-4xl font-bold" id="availableCount">0</div>
                    <div class="text-sm">Available</div>
                </div>
            </div>
        </div>

        <!-- Vouchers Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="vouchersContainer">
            <!-- Vouchers will be loaded here -->
        </div>
    </main>

    <script src="js/services/api.js"></script>
    <script>
        const COLLECTED_STORAGE_KEY = 'vouchers_collected';
        const COLOR_ICON_MAP = {
            'Electronics': { color: 'voucher-blue', icon: '💻' },
            'Fashion': { color: 'voucher-purple', icon: '👗' },
            'Mobile & Gadgets': { color: 'voucher-green', icon: '📱' },
            'Home': { color: 'voucher-purple', icon: '🏠' },
            'Sports': { color: 'voucher-blue', icon: '⚽' },
            'Beauty': { color: 'voucher-pink', icon: '💄' },
            'Baby & Toys': { color: 'voucher-teal', icon: '🧸' },
            'Food': { color: 'voucher-orange', icon: '🍜' },
            'Books': { color: 'voucher-cyan', icon: '📚' }
        };

        let VOUCHERS = [];
        let currentTab = 'product';
        let usedVoucherCodes = [];
        let vouchersLoaded = false;
        let currentShopId = null;

        // Parse query params
        const urlParams = new URLSearchParams(window.location.search);
        currentShopId = urlParams.get('shopId');
        const initialTab = urlParams.get('tab'); // 'shop', 'product', 'shipping'

        // Init Logic
        document.addEventListener('DOMContentLoaded', () => {
            // Auto-switch tab if requested via URL
            if (initialTab && ['product', 'shipping', 'collected'].includes(initialTab)) {
                switchTab(initialTab);
            }

            loadUsedVoucherCodes();
            loadVouchers();
        });

        function getCollectedIds() {
            try {
                const raw = localStorage.getItem(COLLECTED_STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function setCollectedIds(ids) {
            localStorage.setItem(COLLECTED_STORAGE_KEY, JSON.stringify(ids));
        }

        function formatMinSpend(val) {
            if (!val || val === 0) return '₫0';
            if (val >= 1000) return '₫' + (val / 1000) + 'k';
            return '₫' + val;
        }

        function formatDiscount(v) {
            if (!v) return '';
            const type = (v.discountType || '').toUpperCase();
            const val = v.discountValue;
            if (type === 'PERCENTAGE') return val + '% OFF';
            return '₫' + (val >= 1000 ? (val / 1000) + 'k' : val) + ' OFF';
        }

        function formatExpiry(endDate) {
            if (!endDate) return '-';
            const d = new Date(endDate);
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function mapApiVoucherToFrontend(v) {
            const cat = v.categoryRestriction ? (COLOR_ICON_MAP[v.categoryRestriction] || { color: 'voucher-blue', icon: '🏷️' }) : { color: 'voucher-orange', icon: '🎉' };
            if (v.type === 'SHIPPING') cat.icon = v.code.includes('SUPER') ? '🚀' : v.code.includes('EXPRESS') ? '⚡' : v.code.includes('WEEKEND') ? '🌴' : v.code.includes('NEWUSER') ? '👋' : v.code.includes('FLASH') ? '🔥' : '🚚';
            else if (v.type === 'SHOP') { cat.icon = '🏪'; cat.color = 'voucher-purple'; }

            const collected = getCollectedIds().includes(v.id);
            return {
                id: v.id,
                code: v.code,
                type: v.type === 'SHIPPING' ? 'shipping' : (v.type === 'SHOP' ? 'shop' : 'product'),
                shopId: v.shopId, // Important for filtering
                title: v.description,
                discount: formatDiscount(v),
                minOrder: formatMinSpend(v.minSpend),
                expiry: formatExpiry(v.endDate),
                color: v.type === 'SHIPPING' ? (v.code.includes('SUPER') ? 'voucher-blue' : v.code.includes('EXPRESS') ? 'voucher-orange' : 'voucher-green') : cat.color,
                icon: cat.icon,
                collected,
                stock: v.quantity != null ? v.quantity : 0,
                categoryRestriction: v.categoryRestriction || null
            };
        }

        async function loadVouchers() {
            try {
                let list = [];
                // If viewing shop vouchers, we might need a specific API or filter existing list
                // 1. Fetch Platform Vouchers
                let allVouchers = await VoucherAPI.getAllVouchers();
                console.log('Platform vouchers loaded:', allVouchers.length);

                VOUCHERS = allVouchers.map(mapApiVoucherToFrontend);
                console.log('Total Vouchers mapped:', VOUCHERS.length);

                vouchersLoaded = true;
                renderVouchers();
            } catch (error) {
                console.error('Error loading vouchers:', error);
                const container = document.getElementById('vouchersContainer');
                if (container) {
                    container.innerHTML = `
                        <div class="col-span-full text-center text-red-500 py-8">
                            <i class="fas fa-exclamation-circle text-2xl mb-2"></i>
                            <p>Failed to load vouchers. Please try again later.</p>
                        </div>
                    `;
                }
            }
        }
        async function loadUsedVoucherCodes() {
            try {
                // Chỉ gọi API khi user đã đăng nhập (tránh lỗi 403)
                
                if (typeof VoucherAPI !== 'undefined' && localStorage.getItem("accessToken")) {
                    usedVoucherCodes = await VoucherAPI.getUsedVoucherCodes() || [];
                } else {
                    usedVoucherCodes = [];
                }
            } catch (e) {
                usedVoucherCodes = [];
            }
        }

        function switchTab(tab) {
            currentTab = tab;

            // Update Tab UI
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.className = 'py-4 px-2 text-gray-600 hover:text-orange-500 transition-colors border-b-2 border-transparent';
            });

            const activeBtn = document.getElementById(`tab-${tab}`);
            if (activeBtn) {
                activeBtn.className = 'py-4 px-2 border-b-2 border-orange-500 text-orange-600 font-semibold transition-colors';
            }

            renderVouchers();
        }

        function renderVouchers() {
            const container = document.getElementById('vouchersContainer');

            if (!vouchersLoaded) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 text-gray-500">
                        <div class="inline-block w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p>Đang tải voucher...</p>
                    </div>
                `;
                return;
            }

            // Re-map collected status from localStorage (in case it changed)
            const collectedIds = getCollectedIds();
            VOUCHERS.forEach(v => { v.collected = collectedIds.includes(v.id); });

            // Filter Logic
            // Filter Logic
            let filteredVouchers = [];
            const activeTabLower = currentTab.toLowerCase();

            if (activeTabLower === 'collected') {
                filteredVouchers = VOUCHERS.filter(v => v.collected);
            } else {
                filteredVouchers = VOUCHERS.filter(v => (v.type || '').toLowerCase() === activeTabLower);
            }

            // Update Collected Count & Banner
            const collectedCount = VOUCHERS.filter(v => v.collected).length;
            const collectedEl = document.getElementById('collectedCount');
            if (collectedEl) collectedEl.textContent = collectedCount;

            const productCount = VOUCHERS.filter(v => v.type === 'product' || v.type === 'shop').length;
            const availEl = document.getElementById('availableCount');
            if (availEl) availEl.textContent = productCount;

            if (filteredVouchers.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-400">
                        <div class="text-5xl mb-4">🏷️</div>
                        <p>No vouchers found in this category.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredVouchers.map(v => {
                const isUsed = usedVoucherCodes.includes(v.code);
                const cardColor = isUsed ? 'voucher-gray filter grayscale' : v.color;
                
                let buttonHtml = '';
                if (isUsed) {
                    buttonHtml = `<button disabled class="bg-gray-200 text-gray-500 w-full py-2 rounded-lg text-sm font-bold shadow-sm cursor-not-allowed">
                                    Đã sử dụng
                                  </button>`;
                } else if (v.collected) {
                    buttonHtml = `<button onclick="handleClickUse('${v.code}', '${v.expiry}', ${v.stock})" 
                                    class="bg-white text-orange-600 hover:bg-orange-50 w-full py-2 rounded-lg text-sm font-bold transition-all transform active:scale-95 shadow-sm">
                                    Use Now
                                  </button>`;
                } else {
                    buttonHtml = `<button onclick="collectVoucher('${v.id}')" 
                                    class="bg-white/90 text-orange-600 hover:bg-white w-full py-2 rounded-lg text-sm font-bold transition-all transform active:scale-95 shadow-sm">
                                    Collect Now
                                  </button>`;
                }

                return `
                <div class="voucher-card ${cardColor} rounded-lg p-3 text-white shadow-lg ${isUsed ? '' : 'hover:shadow-2xl transition-all transform hover:-translate-y-1'} relative">
                    <div class="relative z-10">
                        <div class="flex items-start justify-between mb-2">
                            <div class="text-2xl">${v.icon}</div>
                            <div class="bg-white/20 backdrop-blur-sm px-2 py-0.5 rounded-full text-xs font-semibold">
                                ${v.stock} left
                            </div>
                        </div>
                        
                        <h3 class="text-sm font-bold mb-1 line-clamp-2">${v.title}</h3>
                        <div class="text-xs font-mono bg-black/20 inline-block px-1.5 rounded mb-2" title="Voucher Code">
                            <i class="fas fa-key mr-1"></i>${v.code}
                        </div>
                        
                        <div class="flex items-center gap-1 mb-2">
                            <div class="text-xl font-bold">${v.discount}</div>
                            <div class="bg-white/20 px-1.5 py-0.5 rounded text-xs">
                                Min. ${v.minOrder}
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between mb-2">
                            <div class="text-xs opacity-90">
                                <i class="far fa-clock mr-1"></i>
                                ${v.expiry}
                            </div>
                        </div>
                        ${v.categoryRestriction ? `<div class="text-xs opacity-80 mb-1"><i class="fas fa-tag mr-1"></i>Chỉ áp dụng: ${v.categoryRestriction}</div>` : ''}
                        
                        <div class="mt-2">
                            ${buttonHtml}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function handleClickUse(code, expiry, stock) {
            // Check validity on click
            const isExpired = new Date(expiry) < new Date();
            const isOutOfStock = stock <= 0;
            const isAlreadyUsed = usedVoucherCodes.includes(code);

            if (isAlreadyUsed) {
                showToast('Bạn đã sử dụng mã này rồi!', 'info');
                return;
            }
            if (isExpired) {
                showToast('Tiếc quá, mã này đã hết hạn!', 'error');
                return;
            }
            if (isOutOfStock) {
                showToast('Mã này đã hết lượt sử dụng!', 'error');
                return;
            }

            // If valid, proceed to use
            useVoucher(code);
        }

        function useVoucher(code) {
            if (usedVoucherCodes.includes(code)) {
                showToast('Voucher này đã được sử dụng trong đơn hàng trước.');
                return;
            }
            const voucher = VOUCHERS.find(v => v.code === code);
            let type = 'SHIPPING';
            if (voucher) {
                if (voucher.type === 'product') type = 'PRODUCT';
                if (voucher.type === 'shop') type = 'SHOP';
            }

            // Lưu vào key riêng biệt theo loại voucher để không ghi đè lên nhau
            if (type === 'PRODUCT' || type === 'SHOP') {
                // Save subType so checkout knows which tab to open
                const subType = type;
                localStorage.setItem('autoApplyProductVoucher', JSON.stringify({ code, type, subType }));
            } else {
                localStorage.setItem('autoApplyShippingVoucher', JSON.stringify({ code, type }));
            }

            // Redirect back to checkout - preserve Buy Now params (mode=buynow&productId=...) 
            // so cart doesn't become empty when user came from Buy Now flow
            const returnUrl = sessionStorage.getItem('checkoutReturnUrl')
                || (document.referrer && document.referrer.includes('checkout-backend') ? document.referrer : null);
            window.location.href = returnUrl || 'checkout-backend.html';
        }

        function collectVoucher(id) {
            const voucher = VOUCHERS.find(v => v.id === id);
            if (!voucher || voucher.collected) return;
            if (usedVoucherCodes.includes(voucher.code)) {
                showToast('Voucher này đã được sử dụng trong đơn hàng trước.');
                return;
            }

            const ids = getCollectedIds();
            if (!ids.includes(id)) ids.push(id);
            setCollectedIds(ids);
            voucher.collected = true;
            renderVouchers();
            showToast('🎉 Voucher collected! Check "Collected" tab to use it.');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-bounce';
            toast.innerHTML = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (document.referrer && document.referrer.includes('checkout-backend')) {
                sessionStorage.setItem('checkoutReturnUrl', document.referrer);
            }
            await Promise.all([loadVouchers(), loadUsedVoucherCodes()]);
            renderVouchers();
        });
    </script>
</body>

</html>
